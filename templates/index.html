<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFIE - Dashboard</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Chart.js for Gauge -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-blobs">
        <div class="blob top-left"></div>
        <div class="blob bottom-right"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="glass-panel text-center">
            <h1 class="gradient-text">DFIE</h1>
            <p>Digital Footprint Intelligence Engine</p>
        </header>

        <!-- Search Form -->
        <section class="glass-panel search-section">
            <h2>Scan a Identity Handle</h2>
            <form id="scanForm" class="input-group">
                <select id="scanType" class="glass-input">
                    <option value="email">Email Address</option>
                    <option value="username">Username / Handle</option>
                </select>
                <input type="text" id="identifierInput" placeholder="Enter identifier to scan..." class="glass-input" required>
                <button type="submit" class="btn-primary" id="scanBtn">Generate Intelligence</button>
            </form>
            <div id="loading" class="hidden">
        </section>

        <!-- Image EXIF Scan -->
        <section class="glass-panel search-section" style="margin-top: 2rem;">
            <h2>Forensic Image Scanner</h2>
            <form id="imageForm" class="input-group">
                <input type="file" id="imageInput" accept="image/*" class="glass-input" required>
                <button type="submit" class="btn-primary" id="imageBtn">Extract Metadata</button>
            </form>
            <div id="imageLoading" class="hidden" style="margin-top: 1rem; color: #cbd5e1;">
                <span class="spinner"></span> Analyzing image file...
            </div>
            <div id="imageResults" class="hidden" style="margin-top: 1.5rem; text-align: left; background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 0.5rem; white-space: pre-wrap; font-family: monospace; color: #a7f3d0; border-left: 4px solid var(--primary);"></div>
        </section>

        <!-- Dashboard Results (Hidden by default, shown for mockup here) -->
        <div id="resultsDashboard" class="dashboard-grid hidden">
            <!-- Left Col: Risk Score -->
            <div class="glass-panel score-card">
                <h3>Digital Risk Score</h3>
                <div class="gauge-container">
                    <canvas id="riskGauge"></canvas>
                </div>
                <h4 id="riskCategory" class="risk-label">Awaiting Scan</h4>
            </div>

            <!-- Right Col: Breaches & Platforms -->
            <div class="right-col">
                <div class="glass-panel">
                    <h3>Data Breaches</h3>
                    <ul id="breachList" class="data-list">
                        <!-- Mock data for Step 5 UI layout demonstration -->
                        <li class="list-item alert">
                            <strong>Mockbook Social Network</strong>
                            <p>Leaked: Passwords, Emails</p>
                        </li>
                    </ul>
                </div>
                
                <div class="glass-panel mt-2">
                    <h3>Platforms Found</h3>
                    <div id="platformTags" class="tag-container">
                        <!-- Mock tags -->
                        <span class="tag">GitHub</span>
                        <span class="tag">Twitter</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Script -->
    <script>
        let riskChart = null;

        document.getElementById('scanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identifier = document.getElementById('identifierInput').value;
            const scanType = document.getElementById('scanType').value;
            const scanBtn = document.getElementById('scanBtn');
            const loading = document.getElementById('loading');
            const dashboard = document.getElementById('resultsDashboard');

            // Reset UI state
            scanBtn.disabled = true;
            loading.classList.remove('hidden');
            dashboard.classList.add('hidden');
            
            try {
                // Step 6: Backend Connection
                const response = await fetch('/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: identifier, type: scanType })
                });

                const json = await response.json();
                
                if (response.ok) {
                    populateDashboard(json.data);
                } else {
                    alert(json.error || 'Failed to scan identity.');
                }
            } catch (err) {
                console.error(err);
                alert('A network error occurred.');
            } finally {
                scanBtn.disabled = false;
                loading.classList.add('hidden');
            }
        });

        function populateDashboard(data) {
            // 1. Draw Risk Gauge
            drawGauge(data.risk_score);
            
            // Set Category Label
            const categoryEl = document.getElementById('riskCategory');
            categoryEl.textContent = data.risk_category + " Risk";
            
            // Color code the text
            if(data.risk_score >= 75) categoryEl.style.color = '#ef4444'; // Red
            else if(data.risk_score >= 50) categoryEl.style.color = '#f97316'; // Orange
            else if(data.risk_score >= 25) categoryEl.style.color = '#eab308'; // Yellow
            else categoryEl.style.color = '#22c55e'; // Green

            // 2. Populate Breaches
            const breachList = document.getElementById('breachList');
            breachList.innerHTML = ''; // Clear previous
            
            if (data.breaches.length === 0) {
                breachList.innerHTML = '<li class="list-item"><p style="color:var(--text-light)">No breaches found. Great job!</p></li>';
            } else {
                data.breaches.forEach(breach => {
                    const li = document.createElement('li');
                    li.className = 'list-item alert';
                    const titleStr = breach.Title || breach.Name;
                    const classesStr = (breach.DataClasses || []).slice(0, 3).join(', ') + (breach.DataClasses && breach.DataClasses.length > 3 ? '...' : '');
                    
                    li.innerHTML = `
                        <strong>${titleStr} (${(breach.BreachDate || "").split('-')[0]})</strong>
                        <p>Leaked: ${classesStr}</p>
                    `;
                    breachList.appendChild(li);
                });
            }

            // 3. Populate Platforms
            const tagContainer = document.getElementById('platformTags');
            tagContainer.innerHTML = ''; // Clear previous
            
            if (data.platforms && data.platforms.length > 0) {
                data.platforms.forEach(plat => {
                    const span = document.createElement('span');
                    span.className = 'tag';
                    // Make it clickable if there is a URL
                    if (plat.url) {
                        span.innerHTML = `<a href="${plat.url}" target="_blank" style="color:inherit; text-decoration:none;">${plat.platform} <span style="font-size:0.7em;">↗</span></a>`;
                    } else {
                        span.textContent = plat.platform;
                    }
                    tagContainer.appendChild(span);
                });
            } else {
                tagContainer.innerHTML = '<span style="color:rgba(255,255,255,0.5);font-size:0.9rem;">No major platforms detected.</span>';
            }

            // Show the dashboard
            document.getElementById('resultsDashboard').classList.remove('hidden');
        }

        function drawGauge(score) {
            const ctx = document.getElementById('riskGauge').getContext('2d');
            
            // Destroy existing chart if it exists
            if (riskChart) {
                riskChart.destroy();
            }

            // Determine gauge color
            let color = '#22c55e'; // default green
            if(score >= 75) color = '#ef4444'; // red
            else if(score >= 50) color = '#f97316'; // orange
            else if(score >= 25) color = '#eab308'; // yellow

            // Create a half-doughnut chart to simulate a gauge
            riskChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Risk', 'Safe'],
                    datasets: [{
                        data: [score, 100 - score],
                        backgroundColor: [color, 'rgba(255, 255, 255, 0.1)'],
                        borderWidth: 0,
                        circumference: 180,
                        rotation: 270
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '80%', // Thin arc
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    },
                    animation: {
                        animateScale: true,
                        animateRotate: true
                    }
                },
                plugins: [{
                    // Plugin to draw text in the middle
                    id: 'textCenter',
                    beforeDraw: function(chart) {
                        let width = chart.width,
                            height = chart.height,
                            ctx = chart.ctx;

                        ctx.restore();
                        let fontSize = (height / 80).toFixed(2);
                        ctx.font = "bold " + fontSize + "em Outfit";
                        ctx.textBaseline = "middle";
                        ctx.fillStyle = "#fff";

                        let text = score + "/100",
                            textX = Math.round((width - ctx.measureText(text).width) / 2),
                            textY = Math.round(height * 0.75); // Bottom inner circle

                        ctx.fillText(text, textX, textY);
                        ctx.save();
                    }
                }]
            });
        }

        // Image Forensics Upload Logic
        document.getElementById('imageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('imageInput');
            const imageBtn = document.getElementById('imageBtn');
            const loading = document.getElementById('imageLoading');
            const resultsDiv = document.getElementById('imageResults');
            
            if (fileInput.files.length === 0) return;
            
            // Reset UI state
            imageBtn.disabled = true;
            loading.classList.remove('hidden');
            resultsDiv.classList.add('hidden');
            resultsDiv.textContent = '';
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            try {
                const response = await fetch('/scan-image', {
                    method: 'POST',
                    body: formData
                });
                
                const json = await response.json();
                
                if (response.ok && json.status === 'success') {
                    // Prettify the JSON output
                    resultsDiv.textContent = JSON.stringify(json.data, null, 2);
                    resultsDiv.classList.remove('hidden');
                } else {
                    alert(json.message || json.error || 'Failed to analyze image.');
                }
            } catch (err) {
                console.error(err);
                alert('A network error occurred while uploading.');
            } finally {
                imageBtn.disabled = false;
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
